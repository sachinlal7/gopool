name: k1_mobile_app
description: K1 mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  equatable: ^2.0.8
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_local_notifications: ^21.0.0
  flutter_secure_storage: ^10.1.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  get_it: ^9.2.1
  go_router: ^17.2.3
  internet_connection_checker_plus: ^3.0.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  lottie: ^3.3.3
  package_info_plus: ^9.0.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  web_socket_channel: ^3.0.3

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.14.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.2
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  assets:
    - .env.staging
    - .env.production
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/sounds/
    - assets/videos/
